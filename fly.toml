app = 'cherry-kubernao'
primary_region = 'yyz'

[build]

[env]
  DATABASE_PATH = '/data/cherry.db'
  PHX_HOST = 'cherry.kubernao.org'
  PHX_SERVER = 'true'
  PORT = '4000'

[[mounts]]
  source = 'cherry_data'
  destination = '/data'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
